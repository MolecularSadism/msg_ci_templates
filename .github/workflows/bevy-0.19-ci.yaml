name: Bevy 0.19 CI

on:
  workflow_call:
    inputs:
      rust-toolchain:
        description: 'Rust toolchain to use for format, docs, clippy and tests'
        required: false
        type: string
        # Bevy 0.19 requires a toolchain where `cfg_select` is stable
        # (stabilized during the 1.95 cycle), so this variant defaults to
        # stable rather than the older nightly used by the 0.18 variant.
        default: 'stable'
      bevy-lint-enabled:
        description: 'Enable Bevy lint checks'
        required: false
        type: boolean
        default: true
      bevy-lint-toolchain:
        description: 'Rust toolchain used for the Bevy lint job (must be the nightly that the pinned bevy_lint revision requires)'
        required: false
        type: string
        # bevy_lint main pins nightly-2026-04-16, which is new enough to
        # compile Bevy 0.19 (unlike the older nightly the v0.6.0 release uses).
        default: 'nightly-2026-04-16'
      bevy-lint-rev:
        description: 'Bevy lint git revision (from TheBevyFlock/bevy_cli)'
        required: false
        type: string
        # Pinned to a bevy_cli main commit, because no tagged bevy_lint release
        # supports Bevy 0.19 yet. Bump to a tagged release once one ships.
        default: '6d3f8c9b2c98b57276b81eae5058ca31eaea279d'
      forbidden-attributes-check:
        description: 'Check for forbidden doc attributes (no_run, ignore)'
        required: false
        type: boolean
        default: true

env:
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings

jobs:
  # Check formatting
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # Check for forbidden doc attributes
  forbidden-attributes:
    name: Check for forbidden attributes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ inputs.forbidden-attributes-check }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for no_run attribute
        run: |
          if grep -rE '```[a-z]*[, ]*no_run' --include="*.rs" .; then
            echo "Error: Found 'no_run' attribute in documentation (e.g., \`\`\`no_run, \`\`\`rust,no_run)"
            exit 1
          fi

      - name: Check for ignore attribute
        run: |
          if grep -rE '```[a-z]*[, ]*ignore' --include="*.rs" .; then
            echo "Error: Found 'ignore' attribute in documentation (e.g., \`\`\`ignore, \`\`\`rust,ignore)"
            exit 1
          fi

      - name: Check for #[ignore] in tests
        run: |
          if grep -r "#\[ignore\]" --include="*.rs" .; then
            echo "Error: Found '#[ignore]' attribute in tests"
            exit 1
          fi

  # Check documentation
  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Check documentation
        run: cargo doc --no-deps --all-features

  # Run Clippy lints
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -A clippy::needless_pass_by_value -A clippy::too_many_arguments -A clippy::type_complexity

  # Run Bevy lints
  bevy-lint:
    name: Bevy Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ inputs.bevy-lint-enabled }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # bevy_lint requires the nightly it pins, with the `rustc-dev` and
      # `llvm-tools` components (it links against internal rustc crates).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.bevy-lint-toolchain }}
          components: rustc-dev, llvm-tools

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Bevy Lint
        run: cargo install --git https://github.com/TheBevyFlock/bevy_cli --rev ${{ inputs.bevy-lint-rev }} --locked bevy_lint

      - name: Run Bevy lints
        run: bevy_lint --all-targets --all-features

  # Run tests
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run tests
        run: cargo test --all-targets --all-features

      - name: Run doc tests
        run: cargo test --doc --all-features
